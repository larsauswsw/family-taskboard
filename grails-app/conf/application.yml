---
info:
    app:
        name: '@info.app.name@'
        version: '@info.app.version@'
        grailsVersion: '@info.app.grailsVersion@'
grails:
    codegen:
        defaultPackage: taskboard
    profile: web

---
grails:
    mime:
        types:
            all: '*/*'
            atom: application/atom+xml
            css: text/css
            csv: text/csv
            form: application/x-www-form-urlencoded
            html:
              - text/html
              - application/xhtml+xml
            js: text/javascript
            json:
              - application/json
              - text/json
            multipartForm: multipart/form-data
            pdf: application/pdf
            rss: application/rss+xml
            text: text/plain
            hal:
              - application/hal+json
              - application/hal+xml
            xml:
              - text/xml
              - application/xml
    views:
        gsp:
            encoding: UTF-8
            htmlcodec: xml
            codecs:
                scriptlet: html

---
dataSource:
    pooled: true
    jmxExport: true
    driverClassName: org.postgresql.Driver
    dialect: org.hibernate.dialect.PostgreSQLDialect
    username: "${DB_USER:taskboard}"
    password: "${DB_PASSWORD:taskboard}"
    url: "${DB_URL:jdbc:postgresql://localhost:5432/taskboard}"

hibernate:
    cache:
        queries: false
        use_second_level_cache: false

vapid:
    # No default keypair on purpose -- this repo is public, and a committed VAPID
    # private key would let anyone send push notifications impersonating this app
    # to its subscribers. Generate your own with `npx web-push generate-vapid-keys`
    # and set these via env vars (see .env.example); sendToUser() is only ever
    # exercised in production/manual testing, not by the automated test suite
    # (PushServiceIntegrationSpec only checks that publicKey() returns non-null,
    # which an empty string already satisfies).
    publicKey: "${VAPID_PUBLIC_KEY:}"
    privateKey: "${VAPID_PRIVATE_KEY:}"
    subject: "${VAPID_SUBJECT:mailto:admin@example.com}"

environments:
    development:
        dataSource:
            dbCreate: update
    test:
        dataSource:
            driverClassName: org.h2.Driver
            dialect: org.hibernate.dialect.H2Dialect
            username: sa
            password: ''
            dbCreate: create-drop
            url: jdbc:h2:mem:testDb;LOCK_TIMEOUT=10000;DB_CLOSE_ON_EXIT=FALSE
    production:
        dataSource:
            dbCreate: update
            properties:
                jmxEnabled: true
