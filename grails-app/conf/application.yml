---
info:
    app:
        name: '@info.app.name@'
        version: '@info.app.version@'
        grailsVersion: '@info.app.grailsVersion@'
grails:
    codegen:
        defaultPackage: taskboard
    profile: web

---
grails:
    mime:
        types:
            all: '*/*'
            atom: application/atom+xml
            css: text/css
            csv: text/csv
            form: application/x-www-form-urlencoded
            html:
              - text/html
              - application/xhtml+xml
            js: text/javascript
            json:
              - application/json
              - text/json
            multipartForm: multipart/form-data
            pdf: application/pdf
            rss: application/rss+xml
            text: text/plain
            hal:
              - application/hal+json
              - application/hal+xml
            xml:
              - text/xml
              - application/xml
    views:
        gsp:
            encoding: UTF-8
            htmlcodec: xml
            codecs:
                scriptlet: html

---
dataSource:
    pooled: true
    jmxExport: true
    driverClassName: org.postgresql.Driver
    dialect: org.hibernate.dialect.PostgreSQLDialect
    username: "${DB_USER:taskboard}"
    password: "${DB_PASSWORD:taskboard}"
    url: "${DB_URL:jdbc:postgresql://localhost:5432/taskboard}"

hibernate:
    cache:
        queries: false
        use_second_level_cache: false

vapid:
    # Default keypair below is a real, valid EC P-256 VAPID keypair generated for
    # this project (via `npx web-push generate-vapid-keys`) so publicKey() and
    # sendToUser() work out of the box in dev/test without extra setup. Override
    # both env vars with your own keypair for any real deployment -- anyone with
    # this private key can send push notifications impersonating this app.
    publicKey: "${VAPID_PUBLIC_KEY:BEcPvvF9UzPfkVfJCWUteehbrXQnJf3GaTK5AHWQkI8A8qkEJQX7Fodrs0Hbg5o64Z9nctu2qvVp8pZqpN-HYp8}"
    privateKey: "${VAPID_PRIVATE_KEY:tKBIka51Kbm8yRXXwuyykCX5dkpKr22wJ69d0vbQooQ}"
    subject: "${VAPID_SUBJECT:mailto:admin@example.com}"

environments:
    development:
        dataSource:
            dbCreate: update
    test:
        dataSource:
            driverClassName: org.h2.Driver
            dialect: org.hibernate.dialect.H2Dialect
            username: sa
            password: ''
            dbCreate: create-drop
            url: jdbc:h2:mem:testDb;LOCK_TIMEOUT=10000;DB_CLOSE_ON_EXIT=FALSE
    production:
        dataSource:
            dbCreate: update
            properties:
                jmxEnabled: true
